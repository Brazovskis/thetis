name: Test push

on:
  push:
    branches:
      - main
      - release
      - release-candidate

jobs:
  test:
    uses: ./.github/workflows/core.yml
    with:
      branch: ${{ github.ref_name }}
      image: ${{ (github.ref_name == 'release' || github.ref_name == 'release-candidate') && 'firedrakeproject/firedrake-vanilla-default:dev-release' || 'firedrakeproject/firedrake-vanilla-default:dev-main' }}
    secrets: inherit
